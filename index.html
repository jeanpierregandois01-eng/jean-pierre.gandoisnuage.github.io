<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Nuage de mots V2</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>

<style>
body{
    font-family:'Fredoka',sans-serif;
    max-width:1300px;
    margin:auto;
    padding:20px;
}

textarea{
    width:100%;
    height:220px;
    font-family:'Fredoka',sans-serif;
}

#cloud{
    width:100%;
    height:800px;
    border:1px solid #ddd;
}

button{
    padding:10px 20px;
    margin:10px 5px;
    font-family:'Fredoka',sans-serif;
}
</style>
</head>

<body>

<h2>Nuage de mots (expressions conservées)</h2>

<textarea id="input">Réseaux sociaux;50
Service client;35
Qualité des produits;25
Prix attractifs;15
Livraison rapide;8</textarea>

<br>
<button onclick="generate()">Générer</button>

<div id="cloud"></div>

<script>

function generate(){

    const palette = [
        "#E63946",
        "#D62828",
        "#F77F00",
        "#FCBF49",
        "#FF6B35",
        "#E85D04",
        "#9D0208",
        "#6A040F",
        "#F48C06",
        "#DC2F02"
    ];

    const lines = document.getElementById('input').value.trim().split('\n');

    let items = [];
    let maxWeight = 0;

    lines.forEach(line => {
        const p = line.split(';');
        if(p.length >= 2){
            const txt = p[0].trim();
            const weight = parseFloat(p[1]);

            if(!isNaN(weight)){
                maxWeight = Math.max(maxWeight, weight);
                items.push({txt, weight});
            }
        }
    });

    const list = items.map(x => {
        const size = 20 + (120 * x.weight / maxWeight);
        const color = palette[Math.floor(Math.random() * palette.length)];
        return [x.txt, size, color];
    });

    const container = document.getElementById('cloud');
    container.innerHTML = "";

    WordCloud(container, {
        list: list,
        fontFamily: 'Fredoka',
        rotateRatio: 0.15,
        gridSize: 8,
        weightFactor: 1,
        backgroundColor: '#ffffff',
        drawOutOfBound: false,
        shrinkToFit: true
    });
}

generate();

</script>

</body>
</html>
